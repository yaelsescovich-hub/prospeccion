<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>4TMS · Operación</title>
<style>
:root{--navy:#22255A;--must:#D8A828;--green:#6FA52C;--red:#c0392b;--ink:#20232e;--mut:#6b7280;--line:#e3e6ef;--bg:#f4f5f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
header .logo{font-weight:bold;font-size:18px}header .logo span{color:var(--must)}
header .who{margin-left:auto;font-size:12px;color:#c7cbe0;display:flex;align-items:center;gap:10px}
.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 12px;position:sticky;top:48px;z-index:19;overflow-x:auto}
.tabs button{border:none;background:none;padding:12px 14px;font-size:14px;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--navy);font-weight:bold;border-bottom-color:var(--must)}
.main{max-width:1120px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 4px 14px rgba(20,22,40,.04);margin-bottom:14px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.search{flex:1;min-width:170px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px}
select,input,textarea{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;background:#fff}
textarea{width:100%;min-height:60px;resize:vertical}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{color:var(--mut);font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:bold;cursor:pointer}
.btn.g{background:var(--green)}.btn.m{background:var(--must);color:#20232e}.btn.ghost{background:#eef0f7;color:var(--navy)}.btn.sm{padding:6px 9px;font-size:12px}
.btn:disabled{opacity:.55;cursor:default}
.empty{color:var(--mut);text-align:center;padding:22px}
.muted{color:var(--mut)}.hint{font-size:12px;color:var(--mut)}
.fld{margin:8px 0}.fld label{display:block;font-size:12px;color:var(--navy);font-weight:bold;margin-bottom:3px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:640px){.two,.three{grid-template-columns:1fr}}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:#eef0f7;color:var(--navy);font-weight:600}
.gest{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff;font-weight:600}
.sec{font-weight:bold;color:var(--navy);margin:16px 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.03em}
.ov{position:fixed;inset:0;background:rgba(20,22,40,.5);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:24px 12px;overflow:auto}
.modal{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:20px}
.modal h3{color:var(--navy);margin-bottom:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .l{font-size:11px;color:var(--mut)}.kpi .v{font-size:20px;font-weight:bold;color:var(--navy)}
.kpi.g{border-left:4px solid var(--green)}.kpi.m{border-left:4px solid var(--must)}.kpi.n{border-left:4px solid var(--navy)}.kpi.r{border-left:4px solid var(--red)}
/* progreso */
.pbar{height:8px;background:#eef0f7;border-radius:6px;overflow:hidden}.pbar>span{display:block;height:100%;background:var(--green)}
.pbarmini{height:6px;background:#eef0f7;border-radius:4px;overflow:hidden;min-width:70px}.pbarmini>span{display:block;height:100%;background:var(--green)}
/* timeline (ciclo) */
.tl{position:relative;padding-left:28px;margin-top:4px}
.tl:before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tlitem{position:relative;margin-bottom:10px}
.tldot{position:absolute;left:-28px;top:0;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:var(--mut)}
.tldot.hecho{background:var(--green);border-color:var(--green);color:#fff}
.tldot.curso{background:var(--navy);border-color:var(--navy);color:#fff}
.tlbox{border:1px solid var(--line);border-radius:10px;padding:9px 11px}
.tlbox.curso{border-color:var(--navy);background:#f6f7fc}.tlbox.hecho{background:#f5faef}
.tlhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.tlhead .nm{font-weight:bold;color:var(--navy);flex:1;min-width:120px}
.divpost{border-top:1px dashed var(--line);margin:6px 0 10px;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding-top:6px}
.adj{font-size:12px;background:#f6f7fb;border:1px solid var(--line);border-radius:6px;padding:5px 8px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.login{max-width:360px;margin:60px auto;padding:26px}.login h2{color:var(--navy);margin-bottom:4px}
.genrow{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
</style></head>

var SURVEYS={cliente:'https://docs.google.com/forms/d/1RLE00r_PxnXENK20jlfv5JS6MW3gq3LR9GFHqJ46RD0/viewform',candidato:'https://docs.google.com/forms/d/19an-bAcWivBv7ZZwojeHyD0VDjBuoy4FjMn5kTo3Aco/viewform'};

/* ===================== HELPERS ===================== */
function el(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fix(s){if(s==null)return '';return String(s).replace(/\s+/g,' ').trim();}
function esc2(s){return esc(fix(s));}
function today(){return new Date().toISOString().slice(0,10);}
function fmtMoney(v,m){if(v==null||v==='')return '—';var n=Math.round(Number(v));if(m==='UF')return 'UF '+n.toLocaleString('es-CL');if(m==='USD')return 'US$ '+n.toLocaleString('es-CL');return '$ '+n.toLocaleString('es-CL');}
function daysBetween(a,b){if(!a)return 0;var s=new Date(a),e=b?new Date(b):new Date();var d=Math.round((e-s)/86400000);return d<0?0:d;}
function meNombre(){if(!SESSION)return '';var e=EJEC.find(function(x){return (x.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});return e?e.nombre:(SESSION.email||'').split('@')[0];}
function ejecActivos(){return EJEC.filter(function(e){return e.activo!==false;});}
function ecolor(n){var e=EJEC.find(function(x){return x.nombre===n;});return e&&e.color?e.color:'#8a8f9c';}
function closeOv(){el('ov').style.display='none';el('modal').innerHTML='';}
function openModal(h){el('modal').innerHTML=h;el('ov').style.display='flex';}
function ejecOpts(sel){return '<option value="">— consultor —</option><option'+(sel==='4TMS'?' selected':'')+'>4TMS</option>'+ejecActivos().map(function(e){return '<option'+(e.nombre===sel?' selected':'')+'>'+esc(e.nombre)+'</option>';}).join('');}
function stars(n){n=parseInt(n)||0;var s='';for(var i=1;i<=5;i++){s+='<span style="color:'+(i<=n?'#D8A828':'#d5d8e0')+';font-size:14px">\u2605</span>';}return s;}
function estCPLabel(k){var e=EST_CP.find(function(x){return x.k===(k||'postulante');});return e?e.t:k;}
function cpColor(k){return {colocado:'var(--green)',oferta:'#3b6d11',descartado:'#9aa0a6',presentado:'var(--navy)'}[k]||'var(--must)';}

/* ===================== AUTH ===================== */
function loginView(){
 el('root').innerHTML='<div class="card login"><h2>4TMS · Operación</h2><div class="hint" style="margin-bottom:14px">Entra con tu cuenta del equipo.</div>'
  +'<div class="fld"><label>Email</label><input id="lg_mail" type="email" style="width:100%"></div>'
  +'<div class="fld"><label>Contraseña</label><input id="lg_pass" type="password" style="width:100%" onkeydown="if(event.key===\'Enter\')doLogin()"></div>'
  +'<button class="btn" style="width:100%;margin-top:8px" onclick="doLogin()">Entrar</button>'
  +'<div class="hint" id="lg_msg" style="color:var(--red);margin-top:8px;text-align:center"></div></div>';
}
async function doLogin(){var m=el('lg_msg');m.textContent='';var r=await sb.auth.signInWithPassword({email:(el('lg_mail').value||'').trim(),password:el('lg_pass').value||''});if(r.error){m.textContent='No pudimos entrar: '+r.error.message;return;}await boot();}
async function logout(){await sb.auth.signOut();location.reload();}
async function loadEjec(){try{var r=await sb.from('ejecutivos').select('*').order('nombre');EJEC=r.data||[];}catch(e){EJEC=[];}}
async function boot(){
 var s=await sb.auth.getSession();SESSION=s.data.session?s.data.session.user:null;
 if(!SESSION){loginView();return;}
 await loadEjec();
 var me=EJEC.find(function(e){return (e.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});
 IS_ADMIN=(me&&me.admin===true)||(SESSION.email||'').toLowerCase()===OWNER_EMAIL;

}
function shell(){
 el('root').innerHTML='<header><div class="logo">4T<span>MS</span></div><div style="font-size:13px;color:#c7cbe0">Operación · headhunting</div>'
  +'<div class="who"><span>'+esc(meNombre())+(IS_ADMIN?' · admin':'')+'</span><button class="btn ghost sm" onclick="logout()">Salir</button></div></header>'
  +'<div class="tabs" id="tabs"></div><div class="main" id="app"></div>';
 renderTabs();render();
}
function renderTabs(){
 var T=[['dashboard','Dashboard'],['proyectos','Proyectos'],['bbdd','BBDD candidatos'],['proactivas','Proactivas'],['generadores','Generadores']];
 el('tabs').innerHTML=T.map(function(t){return '<button class="'+(TAB===t[0]?'on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';}).join('');
}
function setTab(t){TAB=t;PROY=null;renderTabs();render();}
function render(){
 if(TAB==='dashboard')return renderDashboard();
 if(TAB==='proyectos')return PROY?renderProyectoDetalle(PROY):renderProyectos();

 if(TAB==='proactivas')return renderProactivas();
 if(TAB==='generadores')return renderGeneradores();
}
function esVigente(p){return (p.estado||'activo')!=='cerrado';}
function consBadges(asig){if(!asig||!asig.length)return '<span class="muted">—</span>';return asig.map(function(a){var t=(a.pct_ejecucion||0),c=(a.pct_comercial||0);return '<span class="gest" style="background:'+ecolor(a.ejecutivo)+'" title="Ejec '+t+'% · Com '+c+'%">'+esc(a.ejecutivo)+' '+(t+c)+'%</span>';}).join(' ');}

/* ciclo del proyecto a partir de sus etapas */
function computeCiclo(etp){
 var total=etp.length,hitoOrden=null;etp.forEach(function(e){if(e.hito&&hitoOrden===null)hitoOrden=e.orden;});
 var core=etp.filter(function(e){return hitoOrden===null||e.orden<=hitoOrden;});
 var hechas=core.filter(function(e){return e.estado==='hecho';}).length;
 var pct=core.length?Math.round(hechas/core.length*100):0;
 var actual=etp.find(function(e){return e.estado==='en_curso';})||etp.find(function(e){return e.estado!=='hecho';})||null;
 var prox=null;if(actual){var i=etp.indexOf(actual);prox=etp.slice(i+1).find(function(e){return e.estado!=='hecho';})||null;}
 var r4=0,rc=0;etp.forEach(function(e){if(hitoOrden!==null&&e.orden>hitoOrden)return;var d=daysBetween(e.inicio_at,e.fin_at);if(e.lado==='cliente')rc+=d;else r4+=d;});
 var pelota=actual?(actual.lado==='cliente'?'Cliente':'4TMS'):(total&&hechas>=core.length?'Cerrado':'—');
 return {total:total,coreLen:core.length,hechas:hechas,pct:pct,actual:actual,prox:prox,r4:r4,rc:rc,pelota:pelota};
}
function pelotaTag(p){if(p==='Cliente')return '<span class="tag" style="background:var(--must);color:#20232e">Cliente</span>';if(p==='4TMS')return '<span class="tag" style="background:var(--navy)">4TMS</span>';return '<span class="muted">'+esc(p)+'</span>';}

/* ===================== DASHBOARD ===================== */
async function renderDashboard(){
 el('app').innerHTML='<div class="empty">Cargando cartera…</div>';
 try{
  var proy=(await sb.from('proyectos').select('*').order('created_at',{ascending:false})).data||[];
  var vig=proy.filter(esVigente);
  var etapas=(await sb.from('proyecto_etapas').select('*')).data||[];
  var cp=(await sb.from('candidatos_proyecto').select('proyecto_id,estado')).data||[];
  var byE={};etapas.forEach(function(e){(byE[e.proyecto_id]=byE[e.proyecto_id]||[]).push(e);});
  Object.keys(byE).forEach(function(k){byE[k].sort(function(a,b){return (a.orden||0)-(b.orden||0);});});
  var enProceso=cp.filter(function(x){return x.estado!=='colocado'&&x.estado!=='descartado';}).length;
  var enCliente=0,sumaR4=0,nR4=0;
  var rows=vig.map(function(p){var c=computeCiclo(byE[p.id]||[]);if(c.pelota==='4TMS')enCliente+=0;if(c.pelota==='4TMS')nR4++;sumaR4+=c.r4;return {p:p,c:c};});
  var pelota4=rows.filter(function(x){return x.c.pelota==='4TMS';}).length;

  var h='<div class="kpis"><div class="kpi n"><div class="l">Proyectos vigentes</div><div class="v">'+vig.length+'</div></div>'
   +'<div class="kpi m"><div class="l">La pelota en 4TMS</div><div class="v">'+pelota4+'</div></div>'
   +'<div class="kpi g"><div class="l">Candidatos en proceso</div><div class="v">'+enProceso+'</div></div>'
   +'<div class="kpi"><div class="l">Reloj 4TMS prom. (días)</div><div class="v">'+(vig.length?Math.round(sumaR4/vig.length):0)+'</div></div></div>';

  h+='<div class="sec">Cartera vigente · dónde está cada proyecto</div><div class="card"><table><thead><tr><th>Cliente / cargo</th><th>Línea</th><th>Etapa actual</th><th>Avance</th><th>Responsable</th><th>Próximo paso</th><th>Reloj (4T/Cli)</th><th>Pelota</th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan=8 class="empty">Sin proyectos vigentes. Crea uno en Proyectos o conviértelo desde Prospección.</td></tr>';
  rows.sort(function(a,b){var o={'4TMS':0,'Cliente':1};return (o[a.c.pelota]==null?2:o[a.c.pelota])-(o[b.c.pelota]==null?2:o[b.c.pelota]);}).forEach(function(x){
   var p=x.p,c=x.c;var resp=c.actual&&c.actual.responsable?c.actual.responsable:'';
   h+='<tr onclick="openProyecto('+p.id+')" style="cursor:pointer">'
    +'<td><b>'+esc2(p.cliente)+'</b><div class="hint">'+esc2(p.cargo)+'</div></td>'
    +'<td><span class="badge">'+esc(p.linea||'—')+'</span></td>'
    +'<td>'+(c.actual?esc(c.actual.etapa_nombre):'<span class="muted">sin etapas</span>')+'</td>'
    +'<td><div class="pbarmini"><span style="width:'+c.pct+'%"></span></div><div class="hint">'+c.hechas+'/'+c.coreLen+' · '+c.pct+'%</div></td>'
    +'<td>'+(resp?'<span class="gest" style="background:'+ecolor(resp)+'">'+esc(resp)+'</span>':'<span class="muted">—</span>')+'</td>'
    +'<td class="muted">'+(c.prox?esc(c.prox.etapa_nombre):(c.pelota==='Cerrado'?'Cerrado':'—'))+(p.proximo_fecha?'<div class="hint">'+esc(p.proximo_fecha)+'</div>':'')+'</td>'
    +'<td class="muted">'+c.r4+' / '+c.rc+'</td>'
    +'<td>'+pelotaTag(c.pelota)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="hint">Ordenado por dónde está la pelota: primero lo que depende de 4TMS. Toca una fila para abrir el proyecto.</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}

/* ===================== PROYECTOS (lista + crear) ===================== */
var PF={estado:'vigente',linea:'',cons:''};
async function renderProyectos(){
 el('app').innerHTML='<div class="empty">Cargando proyectos…</div>';
 try{
  var all=(await sb.from('proyectos').select('*').order('created_at',{ascending:false})).data||[];
  var cons=[];all.forEach(function(p){(p.asignaciones||[]).forEach(function(a){if(a.ejecutivo&&cons.indexOf(a.ejecutivo)<0)cons.push(a.ejecutivo);});});
  var rows=all.filter(function(p){
   if(PF.estado==='vigente'&&!esVigente(p))return false;if(PF.estado==='cerrado'&&esVigente(p))return false;
   if(PF.linea&&p.linea!==PF.linea)return false;
   if(PF.cons&&!((p.asignaciones||[]).some(function(a){return a.ejecutivo===PF.cons;})))return false;return true;});
  var h='<div class="bar"><button class="btn g sm" onclick="nuevoProyecto()">+ Nuevo proyecto</button>'
   +'<select onchange="PF.estado=this.value;renderProyectos()"><option value="vigente"'+(PF.estado==='vigente'?' selected':'')+'>Vigentes</option><option value="cerrado"'+(PF.estado==='cerrado'?' selected':'')+'>Cerrados</option><option value="todos"'+(PF.estado==='todos'?' selected':'')+'>Todos</option></select>'
   +'<select onchange="PF.linea=this.value;renderProyectos()"><option value="">Toda línea</option>'+LINEAS.map(function(l){return '<option'+(PF.linea===l?' selected':'')+'>'+l+'</option>';}).join('')+'</select>'
   +'<select onchange="PF.cons=this.value;renderProyectos()"><option value="">Todo consultor</option>'+cons.map(function(c){return '<option'+(PF.cons===c?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'</select></div>';
  h+='<div class="card"><table><thead><tr><th>Cliente</th><th>Cargo / proyecto</th><th>Línea</th><th>Valor</th><th>Consultores</th><th>Estado</th><th></th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan=7 class="empty">Sin proyectos. Crea uno con “+ Nuevo proyecto” o conviértelo desde Prospección.</td></tr>';
  rows.forEach(function(p){h+='<tr><td><b>'+esc2(p.cliente)+'</b></td><td>'+esc2(p.cargo)+'</td><td><span class="badge">'+esc(p.linea||'—')+'</span></td><td>'+fmtMoney(p.valor_cierre,p.moneda)+'</td><td>'+consBadges(p.asignaciones)+'</td><td>'+(esVigente(p)?'<span class="tag" style="background:var(--green)">Vigente</span>':'<span class="tag" style="background:#9aa0a6">Cerrado</span>')+'</td><td><button class="btn ghost sm" onclick="openProyecto('+p.id+')">Abrir</button></td></tr>';});

function openProyecto(id){PROY=id;TAB='proyectos';renderTabs();renderProyectoDetalle(id);}

/* crear proyecto (con reparto, total 100) */
var NASIG=[];
function nuevoProyecto(){
 NASIG=[{ejecutivo:meNombre(),pe:0,pc:0},{ejecutivo:'',pe:0,pc:0},{ejecutivo:'',pe:0,pc:0},{ejecutivo:'',pe:0,pc:0}];
 var h='<h3>Nuevo proyecto</h3><div class="two"><div class="fld"><label>Cliente</label><input id="np_cli"></div><div class="fld"><label>Cargo / proyecto</label><input id="np_cargo"></div></div>'
  +'<div class="three"><div class="fld"><label>Línea</label><select id="np_linea">'+LINEAS.map(function(l){return '<option value="'+l+'">'+l+' · '+TDESC[l]+'</option>';}).join('')+'</select></div>'
  +'<div class="fld"><label>Valor de cierre (neto)</label><input id="np_valor" type="number"></div>'
  +'<div class="fld"><label>Moneda</label><select id="np_mon">'+MONEDAS.map(function(m){return '<option>'+m+'</option>';}).join('')+'</select></div></div>'
  +'<div class="sec" style="margin-top:10px">Reparto de consultores</div><div class="hint" style="margin-bottom:6px">Ejecución + comercial, entre todos, debe sumar 100%. Puedes asignar a 4TMS.</div><div id="np_asig"></div><div id="np_tot" class="hint" style="margin-top:4px"></div>'
  +'<div style="text-align:right;margin-top:12px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="saveNuevoProyecto()">Crear proyecto</button></div>';
 openModal(h);renderNAsig();
}
function renderNAsig(){
 var h='';NASIG.forEach(function(a,i){h+='<div style="display:grid;grid-template-columns:1fr 90px 90px;gap:6px;margin-bottom:6px"><select onchange="nasigSet('+i+',\'ejecutivo\',this.value)">'+ejecOpts(a.ejecutivo)+'</select>'
  +'<input type="number" placeholder="% ejec" value="'+(a.pe||'')+'" onchange="nasigSet('+i+',\'pe\',this.value)">'
  +'<input type="number" placeholder="% com" value="'+(a.pc||'')+'" onchange="nasigSet('+i+',\'pc\',this.value)"></div>';});
 el('np_asig').innerHTML=h;nasigTot();
}
function nasigSet(i,k,v){NASIG[i][k]=(k==='ejecutivo')?v:(parseInt(v)||0);nasigTot();}
function nasigTot(){var pe=0,pc=0;NASIG.forEach(function(a){if(a.ejecutivo){pe+=a.pe;pc+=a.pc;}});var t=pe+pc;el('np_tot').innerHTML='Total: <b>'+t+'%</b>'+(t!==100?' <span style="color:var(--red)">(debe sumar 100%)</span>':' \u2713');}
async function saveNuevoProyecto(){
 var cli=fix(el('np_cli').value),cargo=fix(el('np_cargo').value);
 if(!cli||!cargo){alert('Cliente y cargo.');return;}
 var asign=NASIG.filter(function(a){return a.ejecutivo;}).map(function(a){return {ejecutivo:a.ejecutivo,pct_ejecucion:a.pe,pct_comercial:a.pc};});
 var tot=0;asign.forEach(function(a){tot+=a.pct_ejecucion+a.pct_comercial;});
 if(asign.length&&tot!==100){alert('El reparto debe sumar 100%. Hoy: '+tot+'%.');return;}
 var row={cliente:cli,cargo:cargo,linea:el('np_linea').value,valor_cierre:parseInt(el('np_valor').value)||null,moneda:el('np_mon').value,asignaciones:asign,estado:'activo',kickoff_at:today()};
 try{var r=await sb.from('proyectos').insert(row).select().single();if(r.error)throw r.error;closeOv();openProyecto(r.data.id);}catch(e){alert(e.message||e);}
}

/* etapas */
async function sembrarEtapas(id,linea){var t=TPL[linea]||TPL.T1;var rows=t.map(function(x,i){return {proyecto_id:id,etapa:i,orden:i,etapa_nombre:x.n,lado:x.l,hito:!!x.hito,estado:'pendiente'};});try{var r=await sb.from('proyecto_etapas').insert(rows);if(r.error)throw r.error;renderProyectoDetalle(id);}catch(e){alert('No se pudo sembrar: '+(e.message||e));}}
function nuevaEtapa(id,orden){openModal('<h3>Nueva etapa</h3><div class="fld"><label>Nombre</label><input id="ne_nom"></div><div class="two"><div class="fld"><label>Lado (reloj)</label><select id="ne_lado"><option value="4tms">4TMS</option><option value="cliente">Cliente</option></select></div><div class="fld"><label>Responsable</label><select id="ne_resp">'+ejecOpts('')+'</select></div></div><div class="fld"><label><input type="checkbox" id="ne_hito" style="width:auto"> Es el hito de éxito (fin del reloj)</label></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="saveNuevaEtapa('+id+','+orden+')">Guardar</button></div>');}
async function saveNuevaEtapa(id,orden){var nom=fix(el('ne_nom').value);if(!nom){alert('Nombre.');return;}try{var r=await sb.from('proyecto_etapas').insert({proyecto_id:id,etapa:orden,orden:orden,etapa_nombre:nom,lado:el('ne_lado').value,responsable:el('ne_resp').value||null,hito:el('ne_hito').checked,estado:'pendiente'});if(r.error)throw r.error;closeOv();renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
async function editEtapa(eid,id){var e=(await sb.from('proyecto_etapas').select('*').eq('id',eid).single()).data;openModal('<h3>Editar etapa</h3><div class="fld"><label>Nombre</label><input id="ee_nom" value="'+esc(e.etapa_nombre||'')+'"></div><div class="two"><div class="fld"><label>Lado (reloj)</label><select id="ee_lado"><option value="4tms"'+(e.lado!=='cliente'?' selected':'')+'>4TMS</option><option value="cliente"'+(e.lado==='cliente'?' selected':'')+'>Cliente</option></select></div><div class="fld"><label>Responsable</label><select id="ee_resp">'+ejecOpts(e.responsable)+'</select></div></div><div class="two"><div class="fld"><label>Inicio</label><input type="date" id="ee_ini" value="'+(e.inicio_at?String(e.inicio_at).slice(0,10):'')+'"></div><div class="fld"><label>Fin</label><input type="date" id="ee_fin" value="'+(e.fin_at?String(e.fin_at).slice(0,10):'')+'"></div></div><div class="fld"><label>Nota</label><textarea id="ee_nota">'+esc(e.nota||'')+'</textarea></div><div class="fld"><label><input type="checkbox" id="ee_hito" style="width:auto" '+(e.hito?'checked':'')+'> Hito de éxito</label></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="saveEditEtapa('+eid+','+id+')">Guardar</button></div>');}
async function saveEditEtapa(eid,id){var u={etapa_nombre:fix(el('ee_nom').value),lado:el('ee_lado').value,responsable:el('ee_resp').value||null,inicio_at:el('ee_ini').value||null,fin_at:el('ee_fin').value||null,nota:fix(el('ee_nota').value),hito:el('ee_hito').checked};try{var r=await sb.from('proyecto_etapas').update(u).eq('id',eid);if(r.error)throw r.error;if(u.hito){await sb.from('proyecto_etapas').update({hito:false}).eq('proyecto_id',id).neq('id',eid);if(u.fin_at)await sb.from('proyectos').update({exito_at:u.fin_at}).eq('id',id);}closeOv();renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
async function etpEstado(eid,estado,id){var u={estado:estado};if(estado==='en_curso')u.inicio_at=new Date().toISOString();if(estado==='hecho')u.fin_at=new Date().toISOString();try{var r=await sb.from('proyecto_etapas').update(u).eq('id',eid);if(r.error)throw r.error;if(estado==='hecho'){var e=(await sb.from('proyecto_etapas').select('hito').eq('id',eid).single()).data;if(e&&e.hito)await sb.from('proyectos').update({exito_at:today()}).eq('id',id);}renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
async function etpLado(eid,lado,id){try{var r=await sb.from('proyecto_etapas').update({lado:lado}).eq('id',eid);if(r.error)throw r.error;renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}

/* ===================== BBDD CANDIDATOS ===================== */
var BF={q:'',area:'',nivel:'',estado:''};
async function renderBBDD(){
 el('app').innerHTML='<div class="empty">Cargando bolsa de talento…</div>';
 try{
  var all=(await sb.from('candidatos').select('*').order('created_at',{ascending:false}).limit(500)).data||[];
  var rows=all.filter(function(c){if(BF.area&&c.area!==BF.area)return false;if(BF.nivel&&c.nivel!==BF.nivel)return false;if(BF.estado&&(c.estado||'nuevo')!==BF.estado)return false;if(BF.q){var s=BF.q.toLowerCase();if(!((fix(c.nombre).toLowerCase().indexOf(s)>=0)||(fix(c.cargo_interes).toLowerCase().indexOf(s)>=0)||(fix(c.email).toLowerCase().indexOf(s)>=0)))return false;}return true;});
  var h='<div class="bar"><input class="search" placeholder="Buscar nombre, cargo o email…" value="'+esc(BF.q)+'" oninput="BF.q=this.value;renderBBDD()">'
   +'<select onchange="BF.area=this.value;renderBBDD()"><option value="">Toda área</option>'+AREAS.map(function(a){return '<option'+(BF.area===a?' selected':'')+'>'+a+'</option>';}).join('')+'</select>'
   +'<select onchange="BF.nivel=this.value;renderBBDD()"><option value="">Todo nivel</option>'+NIVELES.map(function(n){return '<option'+(BF.nivel===n?' selected':'')+'>'+esc(n)+'</option>';}).join('')+'</select>'
   +'<select onchange="BF.estado=this.value;renderBBDD()"><option value="">Todo estado</option>'+EST_CAND.map(function(e){return '<option value="'+e.k+'"'+(BF.estado===e.k?' selected':'')+'>'+e.t+'</option>';}).join('')+'</select>'
   +'<button class="btn g sm" onclick="nuevoCand()">+ Candidato</button></div>';
  h+='<div class="card"><table><thead><tr><th>Nombre</th><th>Área</th><th>Cargo interés</th><th>Nivel</th><th>Estado</th><th>Gestión</th><th></th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan=7 class="empty">Sin candidatos. Llegan por la página de postulación o los agregas aquí.</td></tr>';
  rows.forEach(function(c){var g=c.tomado_por?'<span class="gest" style="background:'+ecolor(c.tomado_por)+'">'+esc(c.tomado_por)+'</span>':'<span class="muted">libre</span>';var ent=c.entrevistada_at?' <span class="badge" style="background:#e9f3dc;color:#3b6d11">entrevistado</span>':'';h+='<tr><td><b>'+esc2(c.nombre)+'</b>'+ent+(c.cv_path?' \uD83D\uDCC4':'')+'</td><td>'+esc(c.area||'—')+'</td><td class="muted">'+esc2(c.cargo_interes)+'</td><td class="muted">'+esc(c.nivel||'')+'</td><td><span class="badge">'+esc((EST_CAND.find(function(e){return e.k===(c.estado||'nuevo');})||{}).t||'')+'</span></td><td>'+g+'</td><td><button class="btn ghost sm" onclick="fichaCand('+c.id+')">Abrir</button></td></tr>';});
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}

 var h='<h3>'+esc2(c.nombre)+'</h3><div class="muted" style="margin-bottom:8px">'+esc(c.area||'')+(c.nivel?' · '+esc(c.nivel):'')+(c.cargo_interes?' · '+esc2(c.cargo_interes):'')+'</div>';

 h+='<div class="two"><div class="fld"><label>Estado</label><select id="fc_est">'+EST_CAND.map(function(e){return '<option value="'+e.k+'"'+((c.estado||'nuevo')===e.k?' selected':'')+'>'+e.t+'</option>';}).join('')+'</select></div>'
  +'<div class="fld"><label>CV</label><div>'+(c.cv_path?'<button class="btn ghost sm" onclick="verCV(\''+esc(c.cv_path)+'\')">Abrir CV</button> ':'')+'<input type="file" id="fc_cv" accept=".pdf,.doc,.docx" style="font-size:11px"></div></div></div>';

 h+='<div class="hint" id="fc_msg"></div><div style="display:flex;gap:6px;justify-content:space-between;margin-top:12px;flex-wrap:wrap"><div>'+(c.tomado_por?'<span class="gest" style="background:'+ecolor(c.tomado_por)+'">'+esc(c.tomado_por)+'</span> <button class="btn ghost sm" onclick="liberarCand('+id+')">Liberar</button>':'<button class="btn ghost sm" onclick="tomarCand('+id+')">Tomar</button>')+'</div><div><button class="btn m sm" onclick="entrevistaProactiva('+id+')">'+(c.entrevistada_at?'Editar pauta':'Registrar entrevista')+'</button> <button class="btn ghost sm" onclick="closeOv()">Cerrar</button> <button class="btn sm" id="fc_btn" onclick="saveCand('+id+')">Guardar</button></div></div>';

 try{

  h+='<div class="card"><table><thead><tr><th>Candidato</th><th>Área / cargo</th><th>Rating</th><th>CV</th><th>LinkedIn</th><th>Entrevista</th><th></th></tr></thead><tbody>';

  all.forEach(function(c){var pa=c.pauta||{};h+='<tr><td><b>'+esc2(c.nombre)+'</b>'+(c.renta?'<div class="hint">Renta: '+esc(c.renta)+'</div>':'')+'</td><td class="muted">'+esc(c.area||'')+(c.cargo_interes?' · '+esc2(c.cargo_interes):'')+'</td><td>'+stars(pa.rating)+'</td><td>'+(c.cv_path?'<button class="btn ghost sm" onclick="verCV(\''+esc(c.cv_path)+'\')">CV</button>':'—')+'</td><td>'+(c.linkedin?'<a href="'+esc(c.linkedin)+'" target="_blank">in \u2197</a>':'—')+'</td><td class="muted">'+esc(c.entrevistada_at||'')+'</td><td><button class="btn ghost sm" onclick="fichaCand('+c.id+')">Ver</button> <button class="btn g sm" onclick="asignarProy('+c.id+')"'+(vig.length?'':' disabled')+'>Asignar</button></td></tr>';});
  h+='</tbody></table>'+(vig.length?'':'<div class="hint" style="margin-top:8px">No hay proyectos vigentes para asignar.</div>')+'</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}
async function asignarProy(cid){var c=(await sb.from('candidatos').select('*').eq('id',cid).single()).data;var vig=((await sb.from('proyectos').select('id,cliente,cargo,linea,estado')).data||[]).filter(esVigente);var h='<h3>Asignar a proyecto vigente</h3><div class="muted" style="margin-bottom:8px">'+esc2(c.nombre)+'</div><div class="fld"><label>Proyecto</label><select id="ap_proy"><option value="">— elige —</option>'+vig.map(function(p){return '<option value="'+p.id+'">'+esc2(p.cliente)+' · '+esc2(p.cargo)+' ('+esc(p.linea)+')</option>';}).join('')+'</select></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="doAsignar('+cid+')">Asignar</button></div>';openModal(h);}
async function doAsignar(cid){var pid=el('ap_proy').value;if(!pid){alert('Elige un proyecto.');return;}var c=(await sb.from('candidatos').select('nombre,cargo_interes,linkedin,renta,cv_path').eq('id',cid).single()).data;try{await sb.from('candidatos_proyecto').insert({proyecto_id:parseInt(pid),candidato_id:cid,nombre:c.nombre,cargo:c.cargo_interes,estado:'presentado',linkedin:c.linkedin,renta:c.renta,cv_path:c.cv_path,responsable:meNombre(),fecha:today()});await sb.from('candidatos').update({estado:'en_proceso',updated_at:new Date().toISOString()}).eq('id',cid);closeOv();alert('Asignado al shortlist del proyecto.');renderProactivas();}catch(e){alert(e.message||e);}}

/* ===================== GENERADORES ===================== */
function renderGeneradores(){
 var h='<div class="hint" style="margin-bottom:10px">Accesos a tus generadores de documentos. Cuando publiques las versiones corregidas, me pasas los links y los dejo apuntando ahí.</div>';
 GENERADORES.forEach(function(g){h+='<div class="genrow"><div><b style="color:var(--navy)">'+esc(g.n)+'</b> <span class="badge">'+esc(g.t)+'</span><div class="hint">'+esc(g.d)+'</div></div><button class="btn sm" onclick="window.open(\''+g.u+'\',\'_blank\')">Abrir</button></div>';});
 el('app').innerHTML=h;
}

function waitSDK(ms){return new Promise(function(r){var t=Date.now();(function c(){if(window.supabase&&window.supabase.createClient)return r(true);if(Date.now()-t>ms)return r(false);setTimeout(c,80);})();});}
(async function(){var ok=await waitSDK(8000);if(!ok){el('root').innerHTML='<div class="card login"><div class="empty" style="color:var(--red)">No cargó la librería. Recarga.</div></div>';return;}sb=window.supabase.createClient(SUPA_URL,SUPA_ANON);await boot();})();
</script>
